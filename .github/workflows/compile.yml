name: Compile

on:
  push:
    branches: [main]
    paths:
      - "rules.typ"
      - "template.typ"

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Cache Nix Store
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Enter Nix devShell, compile (output ASCII name)
        run: |
          nix develop --command bash -lc '
            set -euo pipefail
            typst compile rules.typ "omu-aikido_rules.pdf"
          '

      - name: Create date tag
        id: create_tag
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          TAG="$(date -u +%Y-%m-%d)"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            TAG="${TAG}.v${GITHUB_RUN_NUMBER}"
          fi

          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Upload
        run: |
          set -euxo pipefail
          TAG=${{ steps.create_tag.outputs.tag }}
          gh release create "$TAG" --generate-notes --title "Release $TAG" omu-aikido_rules.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
