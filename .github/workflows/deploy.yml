name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - "rules.typ"
      - "template.typ"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Compile
        run: |
          nix develop --command bash -lc '
            set -euo pipefail
            mkdir -p docs
            typst compile rules.typ docs/rules.pdf
          '

      - name: Add redirect
        run: |
          cat > docs/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="ja">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0; url=rules.pdf">
          </head>
          </html>
          EOF

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - uses: actions/deploy-pages@v4
        id: deployment